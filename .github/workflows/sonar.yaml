name: Build and SonarQube Analysis

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

jobs:
  build:
    runs-on: [self-hosted, windows]   # your Windows runner labels

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up JDK 8
        uses: actions/setup-java@v3
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven
      - name: Install Maven (portable)
        shell: powershell
        run: |
          Invoke-WebRequest https://dlcdn.apache.org/maven/maven-3/3.9.6/binaries/apache-maven-3.9.6-bin.zip -OutFile maven.zip
          Expand-Archive maven.zip -DestinationPath $env:USERPROFILE\maven
          echo "$env:USERPROFILE\maven\apache-maven-3.9.6\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append


      - name: Build and SonarQube Analysis
        shell: powershell
        env:
          SONAR_HOST_URL: 'http://172.16.5.237:9000'
          SONAR_LOGIN: 'squ_cbf71b57b38b7ce7210adf77800277a54cd3e186'
        run: |
          mvn clean verify sonar:sonar `
            -Dsonar.projectKey=java-maven-travis-project `
            -Dsonar.host.url=$env:SONAR_HOST_URL `
            -Dsonar.login=$env:SONAR_LOGIN
